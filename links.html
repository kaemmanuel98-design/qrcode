<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Univers — artistikE studio</title>
  <meta name="description" content="artistikE studio — Instagram et catalogue de créations artisanales.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Bodoni:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      max-width: 350px;
      width: 100%;
    }

    .brand {
      font-family: "Libre Bodoni", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: #152920;
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }

    .brand span {
      font-family: "Inter", sans-serif;
      font-size: 0.65em;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      color: #333;
      margin-bottom: 1.75rem;
      font-size: 1.35rem;
      font-weight: 500;
    }

    .btn {
      display: block;
      background: #000;
      color: #fff;
      text-decoration: none;
      padding: 15px;
      margin: 15px 0;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .btn:focus-visible {
      outline: 2px solid #152920;
      outline-offset: 3px;
    }

    .btn-instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .btn-collection {
      background: #111;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="brand">artistikE <span>studio</span></p>
    <h1>Bienvenue !</h1>
    <a href="https://www.instagram.com/artistke_?igsh=MW01ZWM2NG9xYm15bw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" class="btn btn-instagram">Mon Instagram</a>
    <a href="https://catalogue-art.vercel.app/" class="btn btn-collection">Découvrir ma Collection</a>
  </div>
</body>
</html>
